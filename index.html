<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#47a88d" />
  <title>Calendapp</title>
  <link rel="manifest" href="manifest.json" />

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/rrule@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/rrule@2.7.2/dist/es5/rrule.min.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* =====================
       VARIABLES CSS
       Breakpoints stockés en variables pour éviter les valeurs en dur
       Mode clair : palette personnalisée
       Mode sombre : palette sombre
    ===================== */
    :root {
      --bg: #f0f8f5;
      --surface: #ffffff;
      --text: #043d6e;
      --text-secondary: #2a6a8a;
      --border: #c8ece2;
      --primary: #47a88d;
      --primary-dark: #2e8a71;
      --primary-light: #c8ece2;
      --danger: #e53935;
      --shadow: rgba(4,61,110,0.12);
      --overlay-bg: rgba(0,0,0,0.5); /* 50% noir sur toutes les modales */
      --input-bg: #ffffff;
      --chip-bg: #c8ece2;
      --topbar-text: #ffffff;

      /* Breakpoints : référence centralisée */
      --bp-mobile: 600px;
      --bp-tablet: 1024px;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #f0f0f0;
      --text-secondary: #aaaaaa;
      --border: #333333;
      --primary: #5bc4a8;
      --primary-dark: #47a88d;
      --primary-light: #1a3a30;
      --danger: #ef5350;
      --shadow: rgba(0,0,0,0.5);
      --overlay-bg: rgba(0,0,0,0.65);
      --input-bg: #2a2a2a;
      --chip-bg: #2a2a2a;
      --topbar-text: #f0f0f0;
    }

    /* =====================
       POLICE : SF Pro si dispo (Apple), sinon fallback système
    ===================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text',
                   'Helvetica Neue', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    /* =====================
       BARRE DU HAUT
    ===================== */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--primary);
      color: var(--topbar-text);
      padding: 10px 16px;
      gap: 10px;
      position: relative;
      z-index: 300;
    }

    #topbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }

    #topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* =====================
       CONTRÔLES THÈME (desktop uniquement)
    ===================== */
    #theme-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #theme-icon { font-size: 1rem; }

    .toggle-switch {
      position: relative;
      width: 38px;
      height: 20px;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider { background: rgba(255,255,255,0.6); }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }

    #theme-auto-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      white-space: nowrap;
    }

    #theme-auto-label input { cursor: pointer; }

    /* =====================
       BOUTON CONNEXION (desktop uniquement)
    ===================== */
    #btn-login {
      background: white;
      color: var(--primary);
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      white-space: nowrap;
    }

    #btn-login:hover { background: var(--primary-light); }
    #user-info { font-size: 0.8rem; opacity: 0.9; white-space: nowrap; }

    /* =====================
       BOUTON BURGER (mobile + tablette uniquement)
       Masqué sur desktop via media query
    ===================== */
    #btn-burger {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
    }

    /* =====================
       OVERLAY BURGER (fond sombre derrière le menu)
    ===================== */
    #burger-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 400;
    }

    #burger-overlay.active { display: block; }

    /* =====================
       MENU BURGER
       Slide depuis la droite, z-index au-dessus de l'overlay
    ===================== */
    #burger-menu {
      position: fixed;
      top: 0;
      right: -300px; /* hors écran par défaut */
      width: 280px;
      height: 100vh;
      background: var(--surface);
      z-index: 500;
      box-shadow: -4px 0 24px var(--shadow);
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    #burger-menu.open { right: 0; }

    #burger-menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--primary);
      color: white;
    }

    #burger-menu-header span { font-weight: 700; font-size: 1rem; }

    #btn-close-burger {
      background: none;
      border: none;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }

    /* Entrées du menu burger */
    .burger-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background 0.15s;
    }

    .burger-item:hover { background: var(--primary-light); }
    .burger-icon { font-size: 1.1rem; width: 24px; text-align: center; }

    /* Section thème dans le burger */
    #burger-theme-section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    #burger-theme-section > label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 10px;
    }

    #burger-theme-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Toggle thème dans le burger : couleurs adaptées au fond clair/sombre */
    .toggle-switch-burger .toggle-slider { background: var(--border); }
    .toggle-switch-burger input:checked + .toggle-slider { background: var(--primary); }
    .toggle-switch-burger .toggle-slider:before { background: white; }

    #burger-auto-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    /* =====================
       ÉCRAN DE DÉCONNEXION
       Remplace tout le contenu quand l'utilisateur est déconnecté
    ===================== */
    #disconnected-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 52px);
      gap: 20px;
      padding: 24px;
      text-align: center;
    }

    #disconnected-screen p {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 300px;
      line-height: 1.5;
    }

    #btn-connect-center {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--shadow);
      transition: background 0.2s;
    }

    #btn-connect-center:hover { background: var(--primary-dark); }

    /* =====================
       PAGE ROUTINES (placeholder avec image dino)
    ===================== */
    #routines-page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 52px);
      padding: 24px;
      text-align: center;
      gap: 20px;
    }

    #routines-page img {
      max-width: 320px;
      width: 85%;
      border-radius: 12px;
    }

    #btn-back-calendar {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #btn-back-calendar:hover { background: var(--primary-dark); }

    /* =====================
       VUE PRINCIPALE (calendrier)
    ===================== */
    #main-view { display: block; }

    /* =====================
       SÉLECTEUR DE VUE
    ===================== */
    #view-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #view-selector button {
      border: 1.5px solid var(--primary);
      background: transparent;
      color: var(--primary);
      border-radius: 20px;
      padding: 5px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    #view-selector button.active { background: var(--primary); color: white; }

    /* =====================
       CALENDRIER
    ===================== */
    #calendar-container {
      padding: 12px;
      max-width: 900px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* Adaptation FullCalendar aux variables de thème */
    /* Hauteur calendrier = viewport moins header (52px) et sélecteur de vue (46px) */
    #calendar {  height: calc(100vh - 52px - 46px - 16px);}
    .fc { color: var(--text); }
    .fc-toolbar-title { color: var(--text); font-weight: 700; text-transform: capitalize; }
    .fc-button { background: var(--primary) !important; border-color: var(--primary) !important; }
    .fc-daygrid-day { background: var(--surface); }
    .fc-col-header-cell { background: var(--surface); color: var(--text); }
    .fc-scrollgrid { border-color: var(--border) !important; }
    .fc-scrollgrid td, .fc-scrollgrid th { border-color: var(--border) !important; }

    /* =====================
       BOUTON FLOTTANT "+"
    ===================== */
    #btn-add-event {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--shadow);
      z-index: 100;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-add-event:hover { background: var(--primary-dark); }

    /* =====================
       OVERLAY MODALES (50% noir)
    ===================== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    /* =====================
       MODALES
    ===================== */
    .modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px var(--shadow);
      color: var(--text);
    }

    .modal h2 {
      margin-bottom: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* =====================
       FORMULAIRES
    ===================== */
    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .form-group input[type="text"],
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    .form-group input[type="text"]:focus,
    .form-group textarea:focus,
    .form-group select:focus { outline: none; border-color: var(--primary); }

    .form-group textarea { resize: vertical; min-height: 70px; }

    /* =====================
       TOGGLE TYPE D'ÉVÉNEMENT
    ===================== */
    .type-toggle {
      display: flex;
      border: 1.5px solid var(--primary);
      border-radius: 8px;
      overflow: hidden;
    }

    .type-toggle button {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--primary);
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-toggle button:first-child { border-right: 1.5px solid var(--primary); }
    .type-toggle button.active { background: var(--primary); color: white; }

    /* =====================
       CHAMPS DATETIME CUSTOM (HH:MM + JJ/MMM/AAAA)
    ===================== */
    .datetime-custom {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .time-spinners {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
    }

    /* Spinner heure/minute : scroll infini */
    .spinner {
      width: 32px;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      background: transparent;
      border: none;
      cursor: ns-resize;
      user-select: none;
      padding: 2px 0;
    }

    .spinner:focus { outline: none; }
    .time-separator { font-weight: 700; color: var(--text); font-size: 1rem; }

    .date-selects, .date-only-selects {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .date-selects select, .date-only-selects select {
      padding: 6px 4px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .date-selects select:focus, .date-only-selects select:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* =====================
       BOUTONS
    ===================== */
    .modal-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .modal-actions-right { display: flex; gap: 8px; margin-left: auto; }

    .btn-cancel {
      background: var(--chip-bg);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .btn-save {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-save:hover { background: var(--primary-dark); }

    .btn-delete {
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 700;
    }

    .btn-delete:hover { background: #c62828; }

    /* =====================
       TAGS
    ===================== */
    #tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      color: white;
    }

    .tag-chip.selected { border-color: var(--text); }

    #btn-new-tag {
      background: var(--primary-light);
      color: var(--primary);
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 600;
    }

    /* =====================
       GRILLE COULEURS
    ===================== */
    #color-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }

    .color-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s;
    }

    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected { border-color: var(--text) !important; }

    /* =====================
       RAPPELS
    ===================== */
    #reminders-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }

    .reminder-row { display: flex; gap: 6px; align-items: center; }

    .reminder-row input[type="number"] {
      width: 70px;
      padding: 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }

    .reminder-row select {
      flex: 1;
      padding: 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
    }

    .btn-remove-reminder {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 1.1rem;
      cursor: pointer;
    }

    #btn-add-reminder {
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      margin-top: 4px;
      width: fit-content;
    }

    /* =====================
       MODALE CONFIRMATION SUPPRESSION
    ===================== */
    #overlay-confirm .modal { max-width: 360px; text-align: center; }
    #overlay-confirm h2 { color: var(--danger); }
    #overlay-confirm p { margin: 12px 0 20px; color: var(--text-secondary); font-size: 0.95rem; }
    #confirm-actions { display: flex; flex-direction: column; gap: 10px; }

    /* =====================
       RESPONSIVE : MOBILE (≤ 600px)
    ===================== */
    @media (max-width: 600px) {
      #theme-controls { display: none; }
      #btn-login { display: none; }
      #user-info { display: none !important; }
      #btn-burger { display: block; }
      #topbar h1 { font-size: 1rem; }
      #calendar-container { padding: 8px; }
      .modal { width: 96%; padding: 16px; border-radius: 10px; }
      #view-selector button { padding: 4px 10px; font-size: 0.78rem; }
      .spinner { width: 26px; font-size: 0.9rem; }
      .date-selects select, .date-only-selects select { font-size: 0.82rem; padding: 5px 3px; }
    }

    /* =====================
       RESPONSIVE : TABLETTE (601px - 1024px)
    ===================== */
    @media (min-width: 601px) and (max-width: 1024px) {
      #theme-controls { display: none; }
      #btn-login { display: none; }
      #user-info { display: none !important; }
      #btn-burger { display: block; }
      #topbar h1 { font-size: 1rem; }
      #calendar-container { padding: 10px; }
    }

    /* =====================
       RESPONSIVE : DESKTOP (> 1024px)
       Burger masqué, contrôles desktop visibles
    ===================== */
    @media (min-width: 1025px) {
      #btn-burger { display: none; }
      #theme-controls { display: flex; }
      #burger-menu { display: none !important; }
      #burger-overlay { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- =====================
       BARRE DU HAUT
  ===================== -->
  <div id="topbar">
    <h1>📅 Calendapp <span style="font-size:0.7rem; opacity:0.75; font-weight:400;">v0.04</span></h1>
    <div id="topbar-right">

      <!-- Contrôles thème + connexion (desktop uniquement) -->
      <div id="theme-controls">
        <span id="theme-icon">☀️</span>
        <label class="toggle-switch" title="Mode sombre / clair">
          <input type="checkbox" id="toggle-dark" onchange="onThemeToggle()" />
          <span class="toggle-slider"></span>
        </label>
        <label id="theme-auto-label" title="Suivre le mode de l'appareil">
          <input type="checkbox" id="check-auto-theme" onchange="onAutoThemeChange()" />
          <span>Auto</span>
        </label>
      </div>
      <button id="btn-login" onclick="loginWithGoogle()">Connexion Google</button>
      <span id="user-info" style="display:none;"></span>

      <!-- Bouton burger (mobile + tablette uniquement) -->
      <button id="btn-burger" onclick="openBurger()" aria-label="Menu">☰</button>
    </div>
  </div>

  <!-- =====================
       OVERLAY BURGER
  ===================== -->
  <div id="burger-overlay" onclick="closeBurger()"></div>

  <!-- =====================
       MENU BURGER (slide depuis la droite)
  ===================== -->
  <div id="burger-menu">
    <div id="burger-menu-header">
      <span>Menu</span>
      <button id="btn-close-burger" onclick="closeBurger()">✕</button>
    </div>

    <!-- Entrée 1 : Se connecter / Se déconnecter -->
    <button class="burger-item" id="burger-auth-btn" onclick="burgerAuthAction()">

  <div class="overlay" id="overlay-event">

  <div class="overlay" id="overlay-tag">

          <button class="btn-save" onclick="saveTag()">Créer le tag</button>

  <script>
    // =====================
    // CONFIGURATION
    // Remplace TON_CLIENT_ID_ICI par ton vrai Client ID Google OAuth
    // =====================
    const CLIENT_ID = '959268837895-mqd6t39nk9j8vb2ukoc3pt5m7d7jj1m1.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/calendar';

    // =====================
    // ÉTAT GLOBAL
    // =====================
    let events = JSON.parse(localStorage.getItem('calendapp_events') || '[]');
    let tags = JSON.parse(localStorage.getItem('calendapp_tags') || '[]');
    let selectedTagId = null;
    let selectedColor = null;
    let editingEventId = null;
    let googleAccessToken = null;
    let calendar = null;
    let currentEventType = 'timed'; // créneau horaire par défaut

    // =====================
    // COULEURS DES TAGS
    // =====================
    const COLORS = [
      { id: 'red',       hex: '#e53935', label: 'Rouge' },
      { id: 'orange',    hex: '#fb8c00', label: 'Orange' },
      { id: 'yellow',    hex: '#fdd835', label: 'Jaune' },
      { id: 'green',     hex: '#43a047', label: 'Vert' },
      { id: 'blue',      hex: '#1e88e5', label: 'Bleu' },
      { id: 'indigo',    hex: '#3949ab', label: 'Indigo' },
      { id: 'violet',    hex: '#8e24aa', label: 'Violet' },
      { id: 'white',     hex: '#ffffff', label: 'Blanc' },
      { id: 'lightgray', hex: '#bdbdbd', label: 'Gris clair' },
      { id: 'darkgray',  hex: '#616161', label: 'Gris foncé' },
      { id: 'black',     hex: '#212121', label: 'Noir' },
    ];

    const RRULE_FREQ = { daily: 'DAILY', weekly: 'WEEKLY', monthly: 'MONTHLY' };

    // =====================
    // UTILITAIRES DATE
    // =====================
    const pad = n => String(n).padStart(2, '0');

    function daysInMonth(month, year) {
      return new Date(year, month, 0).getDate();
    }

    function buildOptions(min, max, selected, labelFn) {
      let html = '';
      for (let i = min; i <= max; i++) {
        const label = labelFn ? labelFn(i) : pad(i);
        html += `<option value="${i}" ${i === selected ? 'selected' : ''}>${label}</option>`;
      }
      return html;
    }

    const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

    // =====================
    // CONSTRUCTION DES CHAMPS DATETIME CUSTOM (HH:MM + JJ/MMM/AAAA)
    // =====================
    function buildDatetimeFields(timeContainerId, dateContainerId, initDate) {
      const now = initDate || new Date();
      const h = now.getHours(), m = now.getMinutes();
      const d = now.getDate(), mo = now.getMonth() + 1, y = now.getFullYear();

      const timeContainer = document.getElementById(timeContainerId);
      timeContainer.innerHTML = `
        <span class="spinner" id="${timeContainerId}-h" data-type="hour">${pad(h)}</span>
        <span class="time-separator">:</span>
        <span class="spinner" id="${timeContainerId}-m" data-type="minute">${pad(m)}</span>
      `;
      timeContainer.querySelectorAll('.spinner').forEach(attachSpinnerScroll);

      const dateContainer = document.getElementById(dateContainerId);
      dateContainer.innerHTML = `
        <select id="${dateContainerId}-d" onchange="onDateSelectChange('${dateContainerId}')">${buildOptions(1, daysInMonth(mo, y), d)}</select>
        <select id="${dateContainerId}-mo" onchange="onDateSelectChange('${dateContainerId}')">${buildOptions(1, 12, mo, i => MOIS[i-1])}</select>
        <select id="${dateContainerId}-y" onchange="onDateSelectChange('${dateContainerId}')">${buildOptions(y - 1, y + 5, y)}</select>
      `;
    }

    // =====================
    // CONSTRUCTION DES CHAMPS DATE SEULE (JJ/MMM/AAAA)
    // =====================
    function buildDateOnlyFields(containerId, initDate) {
      const now = initDate || new Date();
      const d = now.getDate(), mo = now.getMonth() + 1, y = now.getFullYear();
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <select id="${containerId}-d">${buildOptions(1, daysInMonth(mo, y), d)}</select>
        <select id="${containerId}-mo" onchange="onDateOnlySelectChange('${containerId}')">${buildOptions(1, 12, mo, i => MOIS[i-1])}</select>
        <select id="${containerId}-y" onchange="onDateOnlySelectChange('${containerId}')">${buildOptions(y - 1, y + 5, y)}</select>
      `;
    }

    function onDateOnlySelectChange(containerId) {
      const mo = parseInt(document.getElementById(`${containerId}-mo`).value);
      const y = parseInt(document.getElementById(`${containerId}-y`).value);
      const dSel = document.getElementById(`${containerId}-d`);
      const maxDay = daysInMonth(mo, y);
      dSel.innerHTML = buildOptions(1, maxDay, Math.min(parseInt(dSel.value), maxDay));
    }

    function onDateSelectChange(dateContainerId) {
      const mo = parseInt(document.getElementById(`${dateContainerId}-mo`).value);
      const y = parseInt(document.getElementById(`${dateContainerId}-y`).value);
      const dSel = document.getElementById(`${dateContainerId}-d`);
      const maxDay = daysInMonth(mo, y);
      dSel.innerHTML = buildOptions(1, maxDay, Math.min(parseInt(dSel.value), maxDay));
    }

    // =====================
    // SCROLL INFINI HEURE / MINUTE
    // Scroll up = +1, scroll down = -1, boucle à 24h et 60min
    // =====================
    function attachSpinnerScroll(spinner) {
      spinner.addEventListener('wheel', function(e) {
        e.preventDefault();
        const type = this.dataset.type;
        let val = parseInt(this.textContent);
        const delta = e.deltaY < 0 ? 1 : -1;
        val = type === 'hour' ? (val + delta + 24) % 24 : (val + delta + 60) % 60;
        this.textContent = pad(val);
        applyDuration();
      }, { passive: false });

      let touchStartY = null;
      spinner.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
      spinner.addEventListener('touchmove', e => {
        e.preventDefault();
        if (touchStartY === null) return;
        const diff = touchStartY - e.touches[0].clientY;
        if (Math.abs(diff) < 10) return;
        const type = spinner.dataset.type;
        let val = parseInt(spinner.textContent);
        const delta = diff > 0 ? 1 : -1;
        val = type === 'hour' ? (val + delta + 24) % 24 : (val + delta + 60) % 60;
        spinner.textContent = pad(val);
        touchStartY = e.touches[0].clientY;
        applyDuration();
      }, { passive: false });
    }

    // =====================
    // LIRE / ÉCRIRE LES VALEURS DES CHAMPS CUSTOM
    // =====================
    function getDatetimeValue(timeContainerId, dateContainerId) {
      const h = document.getElementById(`${timeContainerId}-h`).textContent;
      const m = document.getElementById(`${timeContainerId}-m`).textContent;
      const d = pad(parseInt(document.getElementById(`${dateContainerId}-d`).value));
      const mo = pad(parseInt(document.getElementById(`${dateContainerId}-mo`).value));
      const y = document.getElementById(`${dateContainerId}-y`).value;
      return `${y}-${mo}-${d}T${h}:${m}`;
    }

    function getDateOnlyValue(containerId) {
      const dEl = document.getElementById(`${containerId}-d`);
      if (!dEl) return '';
      const d = pad(parseInt(dEl.value));
      const mo = pad(parseInt(document.getElementById(`${containerId}-mo`).value));
      const y = document.getElementById(`${containerId}-y`).value;
      return `${y}-${mo}-${d}`;
    }

    // =====================
    // INITIALISATION
    // =====================
    document.addEventListener('DOMContentLoaded', function () {
      initTheme();
      initCalendarView();

      const now = new Date();
      buildDatetimeFields('start-time-spinners', 'start-date-selects', now);
      buildDatetimeFields('end-time-spinners', 'end-date-selects', new Date(now.getTime() + 3600000));
      buildDateOnlyFields('allday-start-selects', now);
      buildDateOnlyFields('allday-end-selects', now);
      buildDateOnlyFields('recurrence-end-selects', now);

      const calendarEl = document.getElementById('calendar');
     calendar = new FullCalendar.Calendar(calendarEl, {
      locale: 'fr',
      initialView: localStorage.getItem('calendapp_view') || 'dayGridMonth',
      height: '100%',
      contentHeight: '100%',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      titleFormat: { year: 'numeric', month: 'long' },
      dayMinWidth: 0,
      eventMinHeight: 14,
      dateClick: function(info) { openEventModal(info.dateStr); },
      eventClick: function(info) { openEditEventModal(info.event); },
      events: getCalendarEvents()
    });

      calendar.render();

      // Marquer le bouton de vue active selon localStorage
      const savedView = localStorage.getItem('calendapp_view') || 'dayGridMonth';
      highlightViewBtn(savedView);

      renderColorGrid();
      renderTagList();
    });

    // =====================
    // INITIALISER LA VUE CALENDRIER DEPUIS LOCALSTORAGE
    // =====================
    function initCalendarView() {
      const saved = localStorage.getItem('calendapp_view') || 'dayGridMonth';
      highlightViewBtn(saved);
    }

    function highlightViewBtn(viewName) {
      document.querySelectorAll('#view-selector button').forEach(b => b.classList.remove('active'));
      const map = { dayGridMonth: 'btn-month', timeGridWeek: 'btn-week', timeGridDay: 'btn-day' };
      const btn = document.getElementById(map[viewName]);
      if (btn) btn.classList.add('active');
    }

    // =====================
    // FORMAT FULLCALENDAR EVENTS
    // =====================
    function getCalendarEvents() {
      return events.map(ev => {
        const tag = tags.find(t => t.id === ev.tagId);
        const color = tag ? tag.color : '#47a88d';
        const fcEvent = {
          id: ev.id,
          title: ev.title,
          start: ev.start,
          allDay: ev.allDay,
          backgroundColor: color,
          borderColor: color,
          extendedProps: { description: ev.description, recurrence: ev.recurrence, seriesId: ev.id }
        };

        if (ev.recurrence && ev.recurrence !== 'none') {
          const rruleObj = { freq: RRULE_FREQ[ev.recurrence], dtstart: ev.start };
          if (ev.recurrenceEnd) rruleObj.until = ev.recurrenceEnd;
          fcEvent.rrule = rruleObj;
          if (!ev.allDay && ev.end) {
            const diffMin = Math.round((new Date(ev.end) - new Date(ev.start)) / 60000);
            fcEvent.duration = { minutes: diffMin };
          }
        } else {
          fcEvent.end = ev.end || null;
        }

        return fcEvent;
      });
    }

    // =====================
    // CHANGER DE VUE (mémorisé dans localStorage)
    // =====================
    function changeView(viewName) {
      calendar.changeView(viewName);
      highlightViewBtn(viewName);
      localStorage.setItem('calendapp_view', viewName);
    }

    // =====================
    // TOGGLE TYPE D'ÉVÉNEMENT
    // =====================
    function setEventType(type) {
      currentEventType = type;
      document.getElementById('toggle-timed').classList.toggle('active', type === 'timed');
      document.getElementById('toggle-allday').classList.toggle('active', type === 'allday');
      document.getElementById('timed-fields').style.display = type === 'timed' ? 'block' : 'none';
      document.getElementById('allday-fields').style.display = type === 'allday' ? 'block' : 'none';
    }

    // =====================
    // OUVRIR LA MODALE ÉVÉNEMENT (création)
    // dateStr : date pré-remplie si clic sur une case calendrier
    // =====================
    function openEventModal(dateStr) {
      editingEventId = null;
      document.getElementById('modal-event-title').textContent = 'Nouvel événement';
      document.getElementById('event-title').value = '';
      document.getElementById('event-description').value = '';
      document.getElementById('event-recurrence').value = 'none';
      document.getElementById('event-duration').value = '';
      document.getElementById('btn-delete-event').style.display = 'none';
      selectedTagId = null;

      setEventType('timed');
      toggleRecurrenceEnd();

      const baseDate = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
      const endDate = new Date(baseDate.getTime() + 3600000);

      buildDatetimeFields('start-time-spinners', 'start-date-selects', baseDate);
      buildDatetimeFields('end-time-spinners', 'end-date-selects', endDate);
      buildDateOnlyFields('allday-start-selects', baseDate);
      buildDateOnlyFields('allday-end-selects', baseDate);
      buildDateOnlyFields('recurrence-end-selects', baseDate);

      document.getElementById('reminders-list').innerHTML = '';
      renderTagList();
      document.getElementById('overlay-event').classList.add('active');
    }

    // =====================
    // OUVRIR LA MODALE ÉVÉNEMENT (modification)
    // =====================
    function openEditEventModal(fcEvent) {
      const seriesId = fcEvent.extendedProps.seriesId || fcEvent.id;
      const ev = events.find(e => e.id === seriesId || e.id === fcEvent.id);
      if (!ev) return;

      editingEventId = ev.id;
      document.getElementById('modal-event-title').textContent = "Modifier l'événement";
      document.getElementById('event-title').value = ev.title;
      document.getElementById('event-description').value = ev.description || '';
      document.getElementById('event-recurrence').value = ev.recurrence || 'none';
      document.getElementById('event-duration').value = '';
      selectedTagId = ev.tagId || null;

      setEventType(ev.allDay ? 'allday' : 'timed');
      toggleRecurrenceEnd();

      if (!ev.allDay) {
        buildDatetimeFields('start-time-spinners', 'start-date-selects', new Date(ev.start));
        buildDatetimeFields('end-time-spinners', 'end-date-selects', ev.end ? new Date(ev.end) : new Date(new Date(ev.start).getTime() + 3600000));
      } else {
        buildDateOnlyFields('allday-start-selects', new Date(ev.start + 'T00:00:00'));
        if (ev.end) buildDateOnlyFields('allday-end-selects', new Date(ev.end + 'T00:00:00'));
      }

      if (ev.recurrenceEnd) buildDateOnlyFields('recurrence-end-selects', new Date(ev.recurrenceEnd + 'T00:00:00'));

      document.getElementById('reminders-list').innerHTML = '';
      (ev.reminders || []).forEach(r => addReminderRow(r.value, r.unit));

      document.getElementById('btn-delete-event').style.display = 'inline-block';
      renderTagList();
      document.getElementById('overlay-event').classList.add('active');
    }

    function closeEventModal() {
      document.getElementById('overlay-event').classList.remove('active');
    }

    function toggleRecurrenceEnd() {
      const rec = document.getElementById('event-recurrence').value;
      document.getElementById('recurrence-end-field').style.display = rec !== 'none' ? 'block' : 'none';
    }

    // =====================
    // CALCUL AUTOMATIQUE FIN = DÉBUT + DURÉE
    // =====================
    function applyDuration() {
      const durationMin = parseInt(document.getElementById('event-duration').value);
      if (!durationMin) return;
      const startIso = getDatetimeValue('start-time-spinners', 'start-date-selects');
      const startMs = new Date(startIso).getTime();
      if (isNaN(startMs)) return;
      buildDatetimeFields('end-time-spinners', 'end-date-selects', new Date(startMs + durationMin * 60000));
    }

    // =====================
    // ENREGISTRER UN ÉVÉNEMENT
    // =====================
    function saveEvent() {
      const title = document.getElementById('event-title').value.trim();
      if (!title) { alert('Le titre est obligatoire.'); return; }

      const isAllDay = currentEventType === 'allday';
      let start, end;

      if (isAllDay) {
        start = getDateOnlyValue('allday-start-selects');
        end = getDateOnlyValue('allday-end-selects') || null;
        if (!start) { alert('La date de début est obligatoire.'); return; }
      } else {
        start = getDatetimeValue('start-time-spinners', 'start-date-selects');
        end = getDatetimeValue('end-time-spinners', 'end-date-selects') || null;
        if (!start) { alert('La date/heure de début est obligatoire.'); return; }
      }

      const reminders = [];
      document.querySelectorAll('.reminder-row').forEach(row => {
        const val = row.querySelector('input').value;
        const unit = row.querySelector('select').value;
        if (val) reminders.push({ value: parseInt(val), unit });
      });

      const eventData = {
        id: editingEventId || Date.now().toString(),
        title,
        description: document.getElementById('event-description').value.trim(),
        start, end,
        allDay: isAllDay,
        recurrence: document.getElementById('event-recurrence').value,
        recurrenceEnd: getDateOnlyValue('recurrence-end-selects') || null,
        tagId: selectedTagId || null,
        reminders
      };

      if (editingEventId) {
        const idx = events.findIndex(e => e.id === editingEventId);
        events[idx] = eventData;
      } else {
        events.push(eventData);
      }

      localStorage.setItem('calendapp_events', JSON.stringify(events));
      refreshCalendar();
      closeEventModal();
    }

    function refreshCalendar() {
      calendar.removeAllEvents();
      calendar.addEventSource(getCalendarEvents());
    }

    // =====================
    // SUPPRESSION
    // =====================
    function confirmDelete() {
      const ev = events.find(e => e.id === editingEventId);
      if (!ev) return;
      const isRecurrent = ev.recurrence && ev.recurrence !== 'none';
      document.getElementById('btn-delete-series').style.display = isRecurrent ? 'block' : 'none';
      document.getElementById('overlay-confirm').classList.add('active');
    }

    function closeConfirmModal() {
      document.getElementById('overlay-confirm').classList.remove('active');
    }

    function deleteEvent(deleteSeries) {
      events = events.filter(e => e.id !== editingEventId);
      localStorage.setItem('calendapp_events', JSON.stringify(events));
      refreshCalendar();
      closeConfirmModal();
      closeEventModal();
    }

    // =====================
    // TAGS
    // =====================
    function renderTagList() {
      const container = document.getElementById('tag-list');
      container.innerHTML = '';
      tags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip' + (selectedTagId === tag.id ? ' selected' : '');
        chip.style.backgroundColor = tag.color;
        chip.textContent = tag.name;
        chip.onclick = () => {
          selectedTagId = (selectedTagId === tag.id) ? null : tag.id;
          renderTagList();
        };
        container.appendChild(chip);
      });
      const btn = document.createElement('button');
      btn.id = 'btn-new-tag';
      btn.textContent = '+ Nouveau tag';
      btn.onclick = openTagModal;
      container.appendChild(btn);
    }

    // =====================
    // RAPPELS (défaut : 10 minutes)
    // =====================
    function addReminderRow(value = 10, unit = 'minutes') {
      const row = document.createElement('div');
      row.className = 'reminder-row';
      row.innerHTML = `
        <input type="number" min="1" value="${value}" />
        <select>
          <option value="minutes" ${unit==='minutes'?'selected':''}>minutes avant</option>
          <option value="hours"   ${unit==='hours'  ?'selected':''}>heures avant</option>
          <option value="days"    ${unit==='days'   ?'selected':''}>jours avant</option>
          <option value="weeks"   ${unit==='weeks'  ?'selected':''}>semaines avant</option>
        </select>
        <button class="btn-remove-reminder" onclick="this.parentElement.remove()">✕</button>
      `;
      document.getElementById('reminders-list').appendChild(row);
    }

    // =====================
    // MODALE TAG
    // =====================
    function openTagModal() {
      selectedColor = null;
      document.getElementById('tag-name').value = '';
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      document.getElementById('overlay-tag').classList.add('active');
    }

    function closeTagModal() {
      document.getElementById('overlay-tag').classList.remove('active');
    }

    function renderColorGrid() {
      const grid = document.getElementById('color-grid');
      grid.innerHTML = '';
      COLORS.forEach(c => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.backgroundColor = c.hex;
        if (['white', 'yellow', 'lightgray'].includes(c.id)) dot.style.border = '3px solid #bbb';
        dot.title = c.label;
        dot.onclick = () => {
          document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
          dot.classList.add('selected');
          selectedColor = c.hex;
        };
        grid.appendChild(dot);
      });
    }

    function saveTag() {
      const name = document.getElementById('tag-name').value.trim();
      if (!name) { alert('Le nom du tag est obligatoire.'); return; }
      if (!selectedColor) { alert('Veuillez choisir une couleur.'); return; }
      const newTag = { id: Date.now().toString(), name, color: selectedColor };
      tags.push(newTag);
      localStorage.setItem('calendapp_tags', JSON.stringify(tags));
      selectedTagId = newTag.id;
      closeTagModal();
      renderTagList();
    }

    // =====================
    // BURGER MENU
    // =====================
    function openBurger() {
      document.getElementById('burger-menu').classList.add('open');
      document.getElementById('burger-overlay').classList.add('active');
    }

    function closeBurger() {
      document.getElementById('burger-menu').classList.remove('open');
      document.getElementById('burger-overlay').classList.remove('active');
    }

    // =====================
    // AUTH DEPUIS LE BURGER
    // Bascule entre connexion et déconnexion
    // =====================
    function burgerAuthAction() {
      if (googleAccessToken) {
        logoutUser();
      } else {
        closeBurger();
        loginWithGoogle();
      }
    }

    // Met à jour le label et l'icône du bouton auth dans le burger
    function updateBurgerAuthLabel() {
      document.getElementById('burger-auth-label').textContent = googleAccessToken ? 'Se déconnecter' : 'Se connecter';
      document.getElementById('burger-auth-icon').textContent = googleAccessToken ? '🚪' : '🔑';
    }

    // =====================
    // LOGOUT
    // Vide la page : seuls le header et le CTA de reconnexion restent
    // =====================
    function logoutUser() {
      googleAccessToken = null;

      // Supprimer uniquement les events Google du stockage local
      events = events.filter(e => !e.fromGoogle);
      localStorage.setItem('calendapp_events', JSON.stringify(events));

      // Masquer la vue principale et le bouton +
      document.getElementById('main-view').style.display = 'none';
      document.getElementById('btn-add-event').style.display = 'none';
      document.getElementById('disconnected-screen').style.display = 'flex';

      // Réinitialiser l'affichage de connexion dans la topbar desktop
      document.getElementById('btn-login').style.display = 'inline-block';
      document.getElementById('user-info').style.display = 'none';
      document.getElementById('user-info').textContent = '';

      updateBurgerAuthLabel();
      closeBurger();
    }

    // =====================
    // PAGE ROUTINES (placeholder)
    // =====================
    function openRoutines() {
      closeBurger();
      document.getElementById('main-view').style.display = 'none';
      document.getElementById('btn-add-event').style.display = 'none';
      document.getElementById('routines-page').style.display = 'flex';
    }

    function closeRoutines() {
      document.getElementById('routines-page').style.display = 'none';
      document.getElementById('main-view').style.display = 'block';
      document.getElementById('btn-add-event').style.display = 'flex';
    }

    // =====================
    // THÈME (clair / sombre / auto) — mémorisé dans localStorage
    // =====================
    function initTheme() {
      const saved = localStorage.getItem('calendapp_theme') || 'auto';

      if (saved === 'auto') {
        document.getElementById('check-auto-theme').checked = true;
        document.getElementById('toggle-dark').disabled = true;
        document.getElementById('burger-check-auto-theme').checked = true;
        document.getElementById('burger-toggle-dark').disabled = true;
        applySystemTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applySystemTheme);
      } else {
        const isDark = saved === 'dark';
        document.getElementById('toggle-dark').checked = isDark;
        document.getElementById('burger-toggle-dark').checked = isDark;
        applyTheme(isDark);
      }
    }

    // Toggle desktop
    function onThemeToggle() {
      const isDark = document.getElementById('toggle-dark').checked;
      document.getElementById('burger-toggle-dark').checked = isDark;
      applyTheme(isDark);
      localStorage.setItem('calendapp_theme', isDark ? 'dark' : 'light');
    }

    // Toggle burger
    function onBurgerThemeToggle() {
      const isDark = document.getElementById('burger-toggle-dark').checked;
      document.getElementById('toggle-dark').checked = isDark;
      applyTheme(isDark);
      localStorage.setItem('calendapp_theme', isDark ? 'dark' : 'light');
    }

    // Coche Auto desktop
    function onAutoThemeChange() {
      const isAuto = document.getElementById('check-auto-theme').checked;
      document.getElementById('burger-check-auto-theme').checked = isAuto;
      document.getElementById('toggle-dark').disabled = isAuto;
      document.getElementById('burger-toggle-dark').disabled = isAuto;
      if (isAuto) {
        localStorage.setItem('calendapp_theme', 'auto');
        applySystemTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applySystemTheme);
      } else {
        window.matchMedia('(prefers-color-scheme: dark)').removeEventListener('change', applySystemTheme);
        const isDark = document.getElementById('toggle-dark').checked;
        localStorage.setItem('calendapp_theme', isDark ? 'dark' : 'light');
      }
    }

    // Coche Auto burger
    function onBurgerAutoThemeChange() {
      const isAuto = document.getElementById('burger-check-auto-theme').checked;
      document.getElementById('check-auto-theme').checked = isAuto;
      document.getElementById('toggle-dark').disabled = isAuto;
      document.getElementById('burger-toggle-dark').disabled = isAuto;
      onAutoThemeChange();
    }

    function applySystemTheme() {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark);
      document.getElementById('toggle-dark').checked = prefersDark;
      document.getElementById('burger-toggle-dark').checked = prefersDark;
    }

    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('theme-icon').textContent = dark ? '🌙' : '☀️';
      document.getElementById('burger-theme-icon').textContent = dark ? '🌙' : '☀️';
    }

    // =====================
    // CONNEXION GOOGLE OAUTH
    // =====================
    function loginWithGoogle() {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (response) => {
          if (response.access_token) {
            googleAccessToken = response.access_token;
            fetchGoogleCalendarEvents();
          }
        }
      });
      client.requestAccessToken();
    }

    // =====================
    // IMPORT GOOGLE CALENDAR (6 prochains mois)
    // =====================
    function fetchGoogleCalendarEvents() {
      const now = new Date().toISOString();
      const sixMonths = new Date(Date.now() + 180 * 24 * 60 * 60 * 1000).toISOString();
      fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&timeMax=${sixMonths}&singleEvents=true&orderBy=startTime`, {
        headers: { Authorization: `Bearer ${googleAccessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.items) {
          const googleEvents = data.items.map(item => ({
            id: 'google_' + item.id,
            title: item.summary || '(Sans titre)',
            description: item.description || '',
            start: item.start.dateTime || item.start.date,
            end: item.end.dateTime || item.end.date || null,
            allDay: !!item.start.date,
            recurrence: 'none',
            tagId: null,
            reminders: [],
            fromGoogle: true
          }));
          events = [...events.filter(e => !e.fromGoogle), ...googleEvents];
          localStorage.setItem('calendapp_events', JSON.stringify(events));
          refreshCalendar();
          fetchUserInfo();
        }
      })
      .catch(err => console.error('Erreur Google Calendar:', err));
    }

    // =====================
    // AFFICHER L'UTILISATEUR CONNECTÉ
    // Bascule vers la vue principale
    // =====================
    function fetchUserInfo() {
      fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
        headers: { Authorization: `Bearer ${googleAccessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        // Topbar desktop
        document.getElementById('btn-login').style.display = 'none';
        document.getElementById('user-info').style.display = 'inline';
        document.getElementById('user-info').textContent = `👤 ${data.given_name || data.email}`;

        // Afficher la vue principale, masquer l'écran de déconnexion
        document.getElementById('disconnected-screen').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('btn-add-event').style.display = 'flex';

        updateBurgerAuthLabel();
      });
    }

  </script>
</body>
