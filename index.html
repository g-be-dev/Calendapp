<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#47a88d" />
  <title>Calendapp</title>
  <link rel="manifest" href="manifest.json" />

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/rrule@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/rrule@2.7.2/dist/es5/rrule.min.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* =====================
       POLICE
       SF Pro sur Apple, puis fallback système proche
    ===================== */
    body {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue',
                   'Segoe UI', system-ui, sans-serif;
    }

    /* =====================
       VARIABLES CSS
       Mode clair : palette personnalisée
       Mode sombre : palette sombre conservée
    ===================== */
    :root {
      --bg: #f0f8f5;
      --surface: #ffffff;
      --text: #043d6e;
      --text-secondary: #2a6a8a;
      --border: #c8ece2;
      --primary: #47a88d;
      --primary-dark: #2e8a71;
      --primary-light: #c8ece2;
      --danger: #e53935;
      --shadow: rgba(4,61,110,0.12);
      --overlay-bg: rgba(4,61,110,0.35);
      --input-bg: #ffffff;
      --chip-bg: #c8ece2;
      --topbar-text: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #f0f0f0;
      --text-secondary: #aaaaaa;
      --border: #333333;
      --primary: #5bc4a8;
      --primary-dark: #47a88d;
      --primary-light: #1a3a30;
      --danger: #ef5350;
      --shadow: rgba(0,0,0,0.5);
      --overlay-bg: rgba(0,0,0,0.65);
      --input-bg: #2a2a2a;
      --chip-bg: #2a2a2a;
      --topbar-text: #f0f0f0;
    }

    /* =====================
       RESET & BASE
    ===================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    /* =====================
       BARRE DU HAUT
    ===================== */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--primary);
      color: var(--topbar-text);
      padding: 10px 16px;
      gap: 10px;
    }

    #topbar h1 {
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }

    #topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* =====================
       CONTRÔLES DE THÈME
    ===================== */
    #theme-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #theme-icon { font-size: 1rem; }

    .toggle-switch {
      position: relative;
      width: 38px;
      height: 20px;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider { background: rgba(255,255,255,0.6); }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }

    #theme-auto-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      white-space: nowrap;
    }

    #theme-auto-label input { cursor: pointer; }

    /* =====================
       BOUTON CONNEXION
    ===================== */
    #btn-login {
      background: white;
      color: var(--primary);
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    #btn-login:hover { background: var(--primary-light); }
    #user-info { font-size: 0.8rem; opacity: 0.9; white-space: nowrap; }

    /* =====================
       SÉLECTEUR DE VUE
    ===================== */
    #view-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #view-selector button {
      border: 1.5px solid var(--primary);
      background: transparent;
      color: var(--primary);
      border-radius: 20px;
      padding: 5px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    #view-selector button.active {
      background: var(--primary);
      color: white;
    }

    /* =====================
       CALENDRIER
    ===================== */
    #calendar-container {
      padding: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .fc { color: var(--text); }
    .fc-toolbar-title { color: var(--text); font-weight: 700; }
    .fc-button { background: var(--primary) !important; border-color: var(--primary) !important; }
    .fc-daygrid-day { background: var(--surface); }
    .fc-col-header-cell { background: var(--surface); color: var(--text); }
    .fc-scrollgrid { border-color: var(--border) !important; }
    .fc-scrollgrid td, .fc-scrollgrid th { border-color: var(--border) !important; }

    /* =====================
       BOUTON FLOTTANT "+"
    ===================== */
    #btn-add-event {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 12px var(--shadow);
      z-index: 100;
      transition: background 0.2s;
    }

    #btn-add-event:hover { background: var(--primary-dark); }

    /* =====================
       OVERLAY
    ===================== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    /* =====================
       MODALES
    ===================== */
    .modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px var(--shadow);
      color: var(--text);
    }

    .modal h2 {
      margin-bottom: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* =====================
       FORMULAIRES
    ===================== */
    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .form-group input[type="text"],
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.2s;
    }

    .form-group input[type="text"]:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-group textarea { resize: vertical; min-height: 70px; }

    /* =====================
       TOGGLE TYPE D'ÉVÉNEMENT
       Journée entière / Créneau horaire
    ===================== */
    .type-toggle {
      display: flex;
      border: 1.5px solid var(--primary);
      border-radius: 8px;
      overflow: hidden;
    }

    .type-toggle button {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--primary);
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* Séparateur entre les deux boutons du toggle */
    .type-toggle button:first-child {
      border-right: 1.5px solid var(--primary);
    }

    .type-toggle button.active {
      background: var(--primary);
      color: white;
    }

    /* =====================
       CHAMPS DATETIME CUSTOM
       Ordre : HH:MM puis JJ/MM/AAAA
    ===================== */
    .datetime-custom {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Conteneur heure + minutes avec scroll infini */
    .time-spinners {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
    }

    /* Chaque spinner (heure ou minute) :
       scroll up = +1, scroll down = -1, boucle infinie */
    .spinner {
      width: 32px;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      background: transparent;
      border: none;
      cursor: ns-resize;
      user-select: none;
      padding: 2px 0;
    }

    .spinner:focus { outline: none; }

    .time-separator {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
    }

    /* Selects natifs pour jour, mois, année */
    .date-selects {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .date-selects select {
      padding: 6px 4px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .date-selects select:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Champs de date simple (sans heure) pour journée entière */
    .date-only-selects {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .date-only-selects select {
      padding: 6px 4px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* =====================
       BOUTONS
    ===================== */
    .modal-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .modal-actions-right {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .btn-cancel {
      background: var(--chip-bg);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .btn-save {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-save:hover { background: var(--primary-dark); }

    .btn-delete {
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 700;
    }

    .btn-delete:hover { background: #c62828; }

    /* =====================
       TAGS
    ===================== */
    #tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      color: white;
    }

    .tag-chip.selected { border-color: var(--text); }

    #btn-new-tag {
      background: var(--primary-light);
      color: var(--primary);
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 600;
    }

    /* =====================
       GRILLE DE COULEURS
    ===================== */
    #color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0;
    }

    .color-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s;
    }

    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected { border-color: var(--text) !important; }

    /* =====================
       RAPPELS
    ===================== */
    #reminders-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 6px;
    }

    .reminder-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .reminder-row input[type="number"] {
      width: 70px;
      padding: 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }

    .reminder-row select {
      flex: 1;
      padding: 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
    }

    .btn-remove-reminder {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 1.1rem;
      cursor: pointer;
    }

    #btn-add-reminder {
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      margin-top: 4px;
      width: fit-content;
    }

    /* =====================
       MODALE CONFIRMATION SUPPRESSION
    ===================== */
    #overlay-confirm .modal { max-width: 360px; text-align: center; }
    #overlay-confirm h2 { color: var(--danger); }
    #overlay-confirm p { margin: 12px 0 20px; color: var(--text-secondary); font-size: 0.95rem; }

    #confirm-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* =====================
       RESPONSIVE
    ===================== */
    @media (max-width: 600px) {
      #topbar h1 { font-size: 0.95rem; }
      .modal { padding: 16px; }
      #theme-auto-label span { display: none; }
      .datetime-custom { gap: 4px; }
    }
  </style>
</head>
<body>

  <!-- BARRE DU HAUT -->
  <div id="topbar">
<h1>📅 Calendapp <span style="font-size:0.7rem; opacity:0.75; font-weight:400;">v0.03</span></h1>
    <div id="topbar-right">
      <div id="theme-controls">
        <span id="theme-icon">☀️</span>
        <label class="toggle-switch" title="Mode sombre / clair">
          <input type="checkbox" id="toggle-dark" onchange="onThemeToggle()" />
          <span class="toggle-slider"></span>
        </label>
        <label id="theme-auto-label" title="Suivre le mode de l'appareil">
          <input type="checkbox" id="check-auto-theme" onchange="onAutoThemeChange()" />
          <span>Auto</span>
        </label>
      </div>
      <button id="btn-login" onclick="loginWithGoogle()">Connexion Google</button>
      <span id="user-info" style="display:none;"></span>
    </div>
  </div>

  <!-- SÉLECTEUR DE VUE -->
  <div id="view-selector">
    <button onclick="changeView('dayGridMonth')" class="active" id="btn-month">Mois</button>
    <button onclick="changeView('timeGridWeek')" id="btn-week">Semaine</button>
    <button onclick="changeView('timeGridDay')" id="btn-day">Jour</button>
  </div>

  <!-- CALENDRIER -->
  <div id="calendar-container">
    <div id="calendar"></div>
  </div>

  <button id="btn-add-event" onclick="openEventModal()" title="Ajouter un événement">+</button>


  <!-- MODALE : CRÉER / MODIFIER UN ÉVÉNEMENT -->
  <div class="overlay" id="overlay-event">
    <div class="modal">
      <h2 id="modal-event-title">Nouvel événement</h2>

      <div class="form-group">
        <label>Titre *</label>
        <input type="text" id="event-title" placeholder="Ex : Réunion, Anniversaire..." />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="event-description" placeholder="Notes, détails..."></textarea>
      </div>

      <!-- Toggle type d'événement : Créneau horaire actif par défaut -->
      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button id="toggle-timed" class="active" onclick="setEventType('timed')">⏱ Créneau horaire</button>
          <button id="toggle-allday" onclick="setEventType('allday')">📅 Journée entière</button>
        </div>
      </div>

      <!-- CHAMPS CRÉNEAU HORAIRE -->
      <div id="timed-fields">

        <!-- Durée prédéfinie : auto-calcule la fin -->
        <div class="form-group">
          <label>Durée (optionnel)</label>
          <select id="event-duration" onchange="applyDuration()">
            <option value="">Saisie manuelle</option>
            <option value="5">5 minutes</option>
            <option value="10">10 minutes</option>
            <option value="15">15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60">1 heure</option>
          </select>
        </div>

        <div class="form-group">
          <label>Début *</label>
          <!-- Ordre : HH:MM puis JJ/MM/AAAA -->
          <div class="datetime-custom">
            <div class="time-spinners" id="start-time-spinners">
              <!-- Les spinners heure/minute sont générés en JS -->
            </div>
            <div class="date-selects" id="start-date-selects">
              <!-- Les selects jour/mois/année sont générés en JS -->
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Fin *</label>
          <div class="datetime-custom">
            <div class="time-spinners" id="end-time-spinners"></div>
            <div class="date-selects" id="end-date-selects"></div>
          </div>
        </div>

      </div>

      <!-- CHAMPS JOURNÉE ENTIÈRE -->
      <div id="allday-fields" style="display:none;">
        <div class="form-group">
          <label>Date de début *</label>
          <div class="date-only-selects" id="allday-start-selects"></div>
        </div>
        <div class="form-group">
          <label>Date de fin (optionnel, pour plusieurs jours)</label>
          <div class="date-only-selects" id="allday-end-selects"></div>
        </div>
      </div>

      <!-- Récurrence -->
      <div class="form-group">
        <label>Récurrence</label>
        <select id="event-recurrence" onchange="toggleRecurrenceEnd()">
          <option value="none">Aucune (ponctuel)</option>
          <option value="daily">Tous les jours</option>
          <option value="weekly">Toutes les semaines</option>
          <option value="monthly">Tous les mois</option>
        </select>
      </div>

      <div id="recurrence-end-field" style="display:none;">
        <div class="form-group">
          <label>Répéter jusqu'au (optionnel)</label>
          <div class="date-only-selects" id="recurrence-end-selects"></div>
        </div>
      </div>

      <!-- Tag -->
      <div class="form-group">
        <label>Tag (optionnel)</label>
        <div id="tag-list">
          <button id="btn-new-tag" onclick="openTagModal()">+ Nouveau tag</button>
        </div>
      </div>

      <!-- Rappels -->
      <div class="form-group">
        <label>Rappels</label>
        <div id="reminders-list"></div>
        <button id="btn-add-reminder" onclick="addReminderRow()">+ Ajouter un rappel</button>
      </div>

      <div class="modal-actions">
        <button class="btn-delete" id="btn-delete-event" onclick="confirmDelete()" style="display:none;">🗑 Supprimer</button>
        <div class="modal-actions-right">
          <button class="btn-cancel" onclick="closeEventModal()">Annuler</button>
          <button class="btn-save" onclick="saveEvent()">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>


  <!-- MODALE : CONFIRMATION SUPPRESSION -->
  <div class="overlay" id="overlay-confirm">
    <div class="modal">
      <h2>🗑 Supprimer</h2>
      <p>Tu es sûr ?</p>
      <div id="confirm-actions">
        <button class="btn-cancel" onclick="closeConfirmModal()" style="width:100%;">Non, annuler</button>
        <button class="btn-save" onclick="deleteEvent(false)" style="width:100%;">Oui, supprimer cet événement</button>
        <button class="btn-delete" id="btn-delete-series" onclick="deleteEvent(true)" style="width:100%; display:none;">Oui, supprimer toute la série</button>
      </div>
    </div>
  </div>


  <!-- MODALE : CRÉER UN TAG -->
  <div class="overlay" id="overlay-tag">
    <div class="modal">
      <h2>Nouveau tag</h2>
      <div class="form-group">
        <label>Couleur *</label>
        <div id="color-grid"></div>
      </div>
      <div class="form-group">
        <label>Nom du tag * (min. 1 caractère)</label>
        <input type="text" id="tag-name" placeholder="Ex : Perso, 🏋️ Sport, Travail..." />
      </div>
      <div class="modal-actions">
        <div class="modal-actions-right">
          <button class="btn-cancel" onclick="closeTagModal()">Annuler</button>
          <button class="btn-save" onclick="saveTag()">Créer le tag</button>
        </div>
      </div>
    </div>
  </div>


  <script>
    // =====================
    // CONFIGURATION
    // Remplace TON_CLIENT_ID_ICI par ton vrai Client ID Google OAuth
    // =====================
    const CLIENT_ID = '959268837895-mqd6t39nk9j8vb2ukoc3pt5m7d7jj1m1.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/calendar';

    // =====================
    // ÉTAT GLOBAL
    // =====================
    let events = JSON.parse(localStorage.getItem('calendapp_events') || '[]');
    let tags = JSON.parse(localStorage.getItem('calendapp_tags') || '[]');
    let selectedTagId = null;
    let selectedColor = null;
    let editingEventId = null;
    let googleAccessToken = null;
    let calendar = null;
    let currentEventType = 'timed'; // 'timed' ou 'allday' — créneau par défaut

    // =====================
    // COULEURS DES TAGS
    // =====================
    const COLORS = [
      { id: 'red',       hex: '#e53935', label: 'Rouge' },
      { id: 'orange',    hex: '#fb8c00', label: 'Orange' },
      { id: 'yellow',    hex: '#fdd835', label: 'Jaune' },
      { id: 'green',     hex: '#43a047', label: 'Vert' },
      { id: 'blue',      hex: '#1e88e5', label: 'Bleu' },
      { id: 'indigo',    hex: '#3949ab', label: 'Indigo' },
      { id: 'violet',    hex: '#8e24aa', label: 'Violet' },
      { id: 'white',     hex: '#ffffff', label: 'Blanc' },
      { id: 'lightgray', hex: '#bdbdbd', label: 'Gris clair' },
      { id: 'darkgray',  hex: '#616161', label: 'Gris foncé' },
      { id: 'black',     hex: '#212121', label: 'Noir' },
    ];

    const RRULE_FREQ = { daily: 'DAILY', weekly: 'WEEKLY', monthly: 'MONTHLY' };

    // =====================
    // UTILITAIRES DATE
    // =====================
    const pad = n => String(n).padStart(2, '0');

    // Retourne les jours d'un mois donné
    function daysInMonth(month, year) {
      return new Date(year, month, 0).getDate();
    }

    // Génère les options <option> pour un select
    function buildOptions(min, max, selected, labelFn) {
      let html = '';
      for (let i = min; i <= max; i++) {
        const label = labelFn ? labelFn(i) : pad(i);
        html += `<option value="${i}" ${i === selected ? 'selected' : ''}>${label}</option>`;
      }
      return html;
    }

    // Noms des mois en français
    const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

    // =====================
    // CRÉER UN BLOC DATETIME CUSTOM (HH:MM + JJ/MM/AAAA)
    // prefix : 'start' ou 'end' pour identifier les champs
    // initDate : objet Date optionnel pour pré-remplir
    // =====================
    function buildDatetimeFields(timeContainerId, dateContainerId, initDate) {
      const now = initDate || new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const d = now.getDate();
      const mo = now.getMonth() + 1;
      const y = now.getFullYear();

      // --- SPINNERS HEURE / MINUTE ---
      // Chaque spinner est un <span> éditable au scroll (boucle infinie)
      const timeContainer = document.getElementById(timeContainerId);
      timeContainer.innerHTML = `
        <span class="spinner" id="${timeContainerId}-h" data-type="hour">${pad(h)}</span>
        <span class="time-separator">:</span>
        <span class="spinner" id="${timeContainerId}-m" data-type="minute">${pad(m)}</span>
      `;

      // Attacher les événements scroll sur chaque spinner
      timeContainer.querySelectorAll('.spinner').forEach(spinner => {
        attachSpinnerScroll(spinner);
      });

      // --- SELECTS DATE : JJ / MMM / AAAA ---
      const dateContainer = document.getElementById(dateContainerId);
      const yearOptions = buildOptions(y - 1, y + 5, y);
      dateContainer.innerHTML = `
        <select id="${dateContainerId}-d" onchange="onDateSelectChange('${dateContainerId}')">${buildOptions(1, daysInMonth(mo, y), d)}</select>
        <select id="${dateContainerId}-mo" onchange="onDateSelectChange('${dateContainerId}')">${buildOptions(1, 12, mo, i => MOIS[i-1])}</select>
        <select id="${dateContainerId}-y" onchange="onDateSelectChange('${dateContainerId}')">${yearOptions}</select>
      `;
    }

    // =====================
    // CRÉER UN BLOC DATE SEULE (JJ/MMM/AAAA) pour journée entière
    // =====================
    function buildDateOnlyFields(containerId, initDate) {
      const now = initDate || new Date();
      const d = now.getDate();
      const mo = now.getMonth() + 1;
      const y = now.getFullYear();
      const yearOptions = buildOptions(y - 1, y + 5, y);
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <select id="${containerId}-d">${buildOptions(1, daysInMonth(mo, y), d)}</select>
        <select id="${containerId}-mo" onchange="onDateOnlySelectChange('${containerId}')">${buildOptions(1, 12, mo, i => MOIS[i-1])}</select>
        <select id="${containerId}-y" onchange="onDateOnlySelectChange('${containerId}')">${yearOptions}</select>
      `;
    }

    // Recalcule les jours disponibles quand le mois ou l'année change (selects date seule)
    function onDateOnlySelectChange(containerId) {
      const mo = parseInt(document.getElementById(`${containerId}-mo`).value);
      const y = parseInt(document.getElementById(`${containerId}-y`).value);
      const dSel = document.getElementById(`${containerId}-d`);
      const currentDay = parseInt(dSel.value);
      const maxDay = daysInMonth(mo, y);
      dSel.innerHTML = buildOptions(1, maxDay, Math.min(currentDay, maxDay));
    }

    // Même chose pour les selects dans un bloc datetime
    function onDateSelectChange(dateContainerId) {
      const mo = parseInt(document.getElementById(`${dateContainerId}-mo`).value);
      const y = parseInt(document.getElementById(`${dateContainerId}-y`).value);
      const dSel = document.getElementById(`${dateContainerId}-d`);
      const currentDay = parseInt(dSel.value);
      const maxDay = daysInMonth(mo, y);
      dSel.innerHTML = buildOptions(1, maxDay, Math.min(currentDay, maxDay));
    }

    // =====================
    // SCROLL INFINI SUR LES SPINNERS HEURE / MINUTE
    // Scroll up = +1, scroll down = -1, boucle infinie
    // =====================
    function attachSpinnerScroll(spinner) {
      spinner.addEventListener('wheel', function(e) {
        e.preventDefault();
        const type = this.dataset.type;
        let val = parseInt(this.textContent);
        const delta = e.deltaY < 0 ? 1 : -1; // scroll up = +1

        if (type === 'hour') {
          val = (val + delta + 24) % 24;
        } else {
          val = (val + delta + 60) % 60;
        }

        this.textContent = pad(val);

        // Si une durée est sélectionnée, recalculer la fin
        applyDuration();
      }, { passive: false });

      // Support tactile (swipe vertical sur mobile)
      let touchStartY = null;
      spinner.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
      spinner.addEventListener('touchmove', e => {
        e.preventDefault();
        if (touchStartY === null) return;
        const diff = touchStartY - e.touches[0].clientY;
        if (Math.abs(diff) < 10) return;

        const type = spinner.dataset.type;
        let val = parseInt(spinner.textContent);
        const delta = diff > 0 ? 1 : -1;

        if (type === 'hour') val = (val + delta + 24) % 24;
        else val = (val + delta + 60) % 60;

        spinner.textContent = pad(val);
        touchStartY = e.touches[0].clientY;
        applyDuration();
      }, { passive: false });
    }

    // =====================
    // LIRE LA VALEUR D'UN BLOC DATETIME CUSTOM
    // Retourne une string ISO "YYYY-MM-DDTHH:MM"
    // =====================
    function getDatetimeValue(timeContainerId, dateContainerId) {
      const h = document.getElementById(`${timeContainerId}-h`).textContent;
      const m = document.getElementById(`${timeContainerId}-m`).textContent;
      const d = pad(parseInt(document.getElementById(`${dateContainerId}-d`).value));
      const mo = pad(parseInt(document.getElementById(`${dateContainerId}-mo`).value));
      const y = document.getElementById(`${dateContainerId}-y`).value;
      return `${y}-${mo}-${d}T${h}:${m}`;
    }

    // =====================
    // LIRE LA VALEUR D'UN BLOC DATE SEULE
    // Retourne "YYYY-MM-DD" ou "" si vide
    // =====================
    function getDateOnlyValue(containerId) {
      const dEl = document.getElementById(`${containerId}-d`);
      if (!dEl) return '';
      const d = pad(parseInt(dEl.value));
      const mo = pad(parseInt(document.getElementById(`${containerId}-mo`).value));
      const y = document.getElementById(`${containerId}-y`).value;
      return `${y}-${mo}-${d}`;
    }

    // =====================
    // ÉCRIRE UNE VALEUR DANS UN BLOC DATETIME CUSTOM
    // isoString : "YYYY-MM-DDTHH:MM"
    // =====================
    function setDatetimeValue(timeContainerId, dateContainerId, isoString) {
      if (!isoString) return;
      const dt = new Date(isoString);
      document.getElementById(`${timeContainerId}-h`).textContent = pad(dt.getHours());
      document.getElementById(`${timeContainerId}-m`).textContent = pad(dt.getMinutes());
      document.getElementById(`${dateContainerId}-d`).value = dt.getDate();
      document.getElementById(`${dateContainerId}-mo`).value = dt.getMonth() + 1;
      document.getElementById(`${dateContainerId}-y`).value = dt.getFullYear();
    }

    // =====================
    // ÉCRIRE UNE VALEUR DANS UN BLOC DATE SEULE
    // =====================
    function setDateOnlyValue(containerId, dateStr) {
      if (!dateStr) return;
      const parts = dateStr.split('-');
      if (parts.length < 3) return;
      document.getElementById(`${containerId}-d`).value = parseInt(parts[2]);
      document.getElementById(`${containerId}-mo`).value = parseInt(parts[1]);
      document.getElementById(`${containerId}-y`).value = parseInt(parts[0]);
    }

    // =====================
    // INITIALISATION
    // =====================
    document.addEventListener('DOMContentLoaded', function () {
      initTheme();

      // Construire les blocs datetime custom à l'initialisation
      const now = new Date();
      buildDatetimeFields('start-time-spinners', 'start-date-selects', now);
      buildDatetimeFields('end-time-spinners', 'end-date-selects', new Date(now.getTime() + 3600000));
      buildDateOnlyFields('allday-start-selects', now);
      buildDateOnlyFields('allday-end-selects', now);
      buildDateOnlyFields('recurrence-end-selects', now);

      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'fr',
        initialView: 'dayGridMonth',
        height: 'auto',
        headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
        dateClick: function(info) { openEventModal(info.dateStr); },
        eventClick: function(info) { openEditEventModal(info.event); },
        events: getCalendarEvents()
      });

      calendar.render();
      renderColorGrid();
      renderTagList();
    });

    // =====================
    // FORMAT FULLCALENDAR EVENTS
    // =====================
    function getCalendarEvents() {
      return events.map(ev => {
        const tag = tags.find(t => t.id === ev.tagId);
        const color = tag ? tag.color : '#47a88d';
        const fcEvent = {
          id: ev.id,
          title: ev.title,
          start: ev.start,
          allDay: ev.allDay,
          backgroundColor: color,
          borderColor: color,
          extendedProps: { description: ev.description, recurrence: ev.recurrence, seriesId: ev.id }
        };

        if (ev.recurrence && ev.recurrence !== 'none') {
          const rruleObj = { freq: RRULE_FREQ[ev.recurrence], dtstart: ev.start };
          if (ev.recurrenceEnd) rruleObj.until = ev.recurrenceEnd;
          fcEvent.rrule = rruleObj;
          if (!ev.allDay && ev.end) {
            const diffMin = Math.round((new Date(ev.end) - new Date(ev.start)) / 60000);
            fcEvent.duration = { minutes: diffMin };
          }
        } else {
          fcEvent.end = ev.end || null;
        }

        return fcEvent;
      });
    }

    // =====================
    // CHANGER DE VUE
    // =====================
    function changeView(viewName) {
      calendar.changeView(viewName);
      document.querySelectorAll('#view-selector button').forEach(b => b.classList.remove('active'));
      const map = { dayGridMonth: 'btn-month', timeGridWeek: 'btn-week', timeGridDay: 'btn-day' };
      document.getElementById(map[viewName]).classList.add('active');
    }

    // =====================
    // TOGGLE TYPE D'ÉVÉNEMENT
    // =====================
    function setEventType(type) {
      currentEventType = type;
      document.getElementById('toggle-timed').classList.toggle('active', type === 'timed');
      document.getElementById('toggle-allday').classList.toggle('active', type === 'allday');
      document.getElementById('timed-fields').style.display = type === 'timed' ? 'block' : 'none';
      document.getElementById('allday-fields').style.display = type === 'allday' ? 'block' : 'none';
    }

    // =====================
    // OUVRIR LA MODALE ÉVÉNEMENT (création)
    // dateStr : date pré-remplie si clic sur une case calendrier (format YYYY-MM-DD)
    // =====================
    function openEventModal(dateStr) {
      editingEventId = null;
      document.getElementById('modal-event-title').textContent = 'Nouvel événement';
      document.getElementById('event-title').value = '';
      document.getElementById('event-description').value = '';
      document.getElementById('event-recurrence').value = 'none';
      document.getElementById('event-duration').value = '';
      document.getElementById('btn-delete-event').style.display = 'none';
      selectedTagId = null;

      // Par défaut : créneau horaire
      setEventType('timed');
      toggleRecurrenceEnd();

      // Pré-remplir avec la date cliquée ou maintenant
      const baseDate = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
      const endDate = new Date(baseDate.getTime() + 3600000);

      buildDatetimeFields('start-time-spinners', 'start-date-selects', baseDate);
      buildDatetimeFields('end-time-spinners', 'end-date-selects', endDate);
      buildDateOnlyFields('allday-start-selects', baseDate);
      buildDateOnlyFields('allday-end-selects', baseDate);
      buildDateOnlyFields('recurrence-end-selects', baseDate);

      document.getElementById('reminders-list').innerHTML = '';
      renderTagList();
      document.getElementById('overlay-event').classList.add('active');
    }

    // =====================
    // OUVRIR LA MODALE ÉVÉNEMENT (modification)
    // =====================
    function openEditEventModal(fcEvent) {
      const seriesId = fcEvent.extendedProps.seriesId || fcEvent.id;
      const ev = events.find(e => e.id === seriesId || e.id === fcEvent.id);
      if (!ev) return;

      editingEventId = ev.id;
      document.getElementById('modal-event-title').textContent = "Modifier l'événement";
      document.getElementById('event-title').value = ev.title;
      document.getElementById('event-description').value = ev.description || '';
      document.getElementById('event-recurrence').value = ev.recurrence || 'none';
      document.getElementById('event-duration').value = '';
      selectedTagId = ev.tagId || null;

      setEventType(ev.allDay ? 'allday' : 'timed');
      toggleRecurrenceEnd();

      if (!ev.allDay) {
        // Reconstruire les spinners avec les valeurs de l'événement
        const startDate = new Date(ev.start);
        const endDate = ev.end ? new Date(ev.end) : new Date(startDate.getTime() + 3600000);
        buildDatetimeFields('start-time-spinners', 'start-date-selects', startDate);
        buildDatetimeFields('end-time-spinners', 'end-date-selects', endDate);
      } else {
        const startDate = new Date(ev.start + 'T00:00:00');
        buildDateOnlyFields('allday-start-selects', startDate);
        if (ev.end) buildDateOnlyFields('allday-end-selects', new Date(ev.end + 'T00:00:00'));
      }

      if (ev.recurrenceEnd) {
        buildDateOnlyFields('recurrence-end-selects', new Date(ev.recurrenceEnd + 'T00:00:00'));
      }

      document.getElementById('reminders-list').innerHTML = '';
      (ev.reminders || []).forEach(r => addReminderRow(r.value, r.unit));

      document.getElementById('btn-delete-event').style.display = 'inline-block';
      renderTagList();
      document.getElementById('overlay-event').classList.add('active');
    }

    function closeEventModal() {
      document.getElementById('overlay-event').classList.remove('active');
    }

    // =====================
    // FIN DE RÉCURRENCE
    // =====================
    function toggleRecurrenceEnd() {
      const rec = document.getElementById('event-recurrence').value;
      document.getElementById('recurrence-end-field').style.display = rec !== 'none' ? 'block' : 'none';
    }

    // =====================
    // CALCUL AUTOMATIQUE DE LA FIN SELON DURÉE + DÉBUT
    // =====================
    function applyDuration() {
      const durationMin = parseInt(document.getElementById('event-duration').value);
      if (!durationMin) return;

      const startIso = getDatetimeValue('start-time-spinners', 'start-date-selects');
      const startMs = new Date(startIso).getTime();
      if (isNaN(startMs)) return;

      const endDate = new Date(startMs + durationMin * 60000);
      buildDatetimeFields('end-time-spinners', 'end-date-selects', endDate);
    }

    // =====================
    // ENREGISTRER UN ÉVÉNEMENT
    // =====================
    function saveEvent() {
      const title = document.getElementById('event-title').value.trim();
      if (!title) { alert('Le titre est obligatoire.'); return; }

      const isAllDay = currentEventType === 'allday';
      let start, end;

      if (isAllDay) {
        start = getDateOnlyValue('allday-start-selects');
        end = getDateOnlyValue('allday-end-selects') || null;
        if (!start) { alert('La date de début est obligatoire.'); return; }
      } else {
        start = getDatetimeValue('start-time-spinners', 'start-date-selects');
        end = getDatetimeValue('end-time-spinners', 'end-date-selects') || null;
        if (!start) { alert('La date/heure de début est obligatoire.'); return; }
      }

      const reminders = [];
      document.querySelectorAll('.reminder-row').forEach(row => {
        const val = row.querySelector('input').value;
        const unit = row.querySelector('select').value;
        if (val) reminders.push({ value: parseInt(val), unit });
      });

      const eventData = {
        id: editingEventId || Date.now().toString(),
        title,
        description: document.getElementById('event-description').value.trim(),
        start,
        end,
        allDay: isAllDay,
        recurrence: document.getElementById('event-recurrence').value,
        recurrenceEnd: getDateOnlyValue('recurrence-end-selects') || null,
        tagId: selectedTagId || null,
        reminders
      };

      if (editingEventId) {
        const idx = events.findIndex(e => e.id === editingEventId);
        events[idx] = eventData;
      } else {
        events.push(eventData);
      }

      localStorage.setItem('calendapp_events', JSON.stringify(events));
      refreshCalendar();
      closeEventModal();
    }

    function refreshCalendar() {
      calendar.removeAllEvents();
      calendar.addEventSource(getCalendarEvents());
    }

    // =====================
    // SUPPRESSION
    // =====================
    function confirmDelete() {
      const ev = events.find(e => e.id === editingEventId);
      if (!ev) return;
      const isRecurrent = ev.recurrence && ev.recurrence !== 'none';
      document.getElementById('btn-delete-series').style.display = isRecurrent ? 'block' : 'none';
      document.getElementById('overlay-confirm').classList.add('active');
    }

    function closeConfirmModal() {
      document.getElementById('overlay-confirm').classList.remove('active');
    }

    function deleteEvent(deleteSeries) {
      events = events.filter(e => e.id !== editingEventId);
      localStorage.setItem('calendapp_events', JSON.stringify(events));
      refreshCalendar();
      closeConfirmModal();
      closeEventModal();
    }

    // =====================
    // TAGS
    // =====================
    function renderTagList() {
      const container = document.getElementById('tag-list');
      container.innerHTML = '';
      tags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip' + (selectedTagId === tag.id ? ' selected' : '');
        chip.style.backgroundColor = tag.color;
        chip.textContent = tag.name;
        chip.onclick = () => {
          selectedTagId = (selectedTagId === tag.id) ? null : tag.id;
          renderTagList();
        };
        container.appendChild(chip);
      });
      const btn = document.createElement('button');
      btn.id = 'btn-new-tag';
      btn.textContent = '+ Nouveau tag';
      btn.onclick = openTagModal;
      container.appendChild(btn);
    }

    // =====================
    // RAPPELS (valeur par défaut : 10 minutes)
    // =====================
    function addReminderRow(value = 10, unit = 'minutes') {
      const row = document.createElement('div');
      row.className = 'reminder-row';
      row.innerHTML = `
        <input type="number" min="1" value="${value}" />
        <select>
          <option value="minutes" ${unit==='minutes'?'selected':''}>minutes avant</option>
          <option value="hours"   ${unit==='hours'  ?'selected':''}>heures avant</option>
          <option value="days"    ${unit==='days'   ?'selected':''}>jours avant</option>
          <option value="weeks"   ${unit==='weeks'  ?'selected':''}>semaines avant</option>
        </select>
        <button class="btn-remove-reminder" onclick="this.parentElement.remove()">✕</button>
      `;
      document.getElementById('reminders-list').appendChild(row);
    }

    // =====================
    // MODALE TAG
    // =====================
    function openTagModal() {
      selectedColor = null;
      document.getElementById('tag-name').value = '';
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      document.getElementById('overlay-tag').classList.add('active');
    }

    function closeTagModal() {
      document.getElementById('overlay-tag').classList.remove('active');
    }

    function renderColorGrid() {
      const grid = document.getElementById('color-grid');
      grid.innerHTML = '';
      COLORS.forEach(c => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.backgroundColor = c.hex;
        if (['white', 'yellow', 'lightgray'].includes(c.id)) dot.style.border = '3px solid #bbb';
        dot.title = c.label;
        dot.onclick = () => {
          document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
          dot.classList.add('selected');
          selectedColor = c.hex;
        };
        grid.appendChild(dot);
      });
    }

    function saveTag() {
      const name = document.getElementById('tag-name').value.trim();
      if (!name) { alert('Le nom du tag est obligatoire.'); return; }
      if (!selectedColor) { alert('Veuillez choisir une couleur.'); return; }
      const newTag = { id: Date.now().toString(), name, color: selectedColor };
      tags.push(newTag);
      localStorage.setItem('calendapp_tags', JSON.stringify(tags));
      selectedTagId = newTag.id;
      closeTagModal();
      renderTagList();
    }

    // =====================
    // THÈME (clair / sombre / auto) — mémorisé dans localStorage
    // =====================
    function initTheme() {
      const saved = localStorage.getItem('calendapp_theme') || 'auto';
      if (saved === 'auto') {
        document.getElementById('check-auto-theme').checked = true;
        document.getElementById('toggle-dark').disabled = true;
        applySystemTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applySystemTheme);
      } else {
        document.getElementById('check-auto-theme').checked = false;
        document.getElementById('toggle-dark').disabled = false;
        const isDark = saved === 'dark';
        applyTheme(isDark);
        document.getElementById('toggle-dark').checked = isDark;
      }
    }

    function onThemeToggle() {
      const isDark = document.getElementById('toggle-dark').checked;
      applyTheme(isDark);
      localStorage.setItem('calendapp_theme', isDark ? 'dark' : 'light');
    }

    function onAutoThemeChange() {
      const isAuto = document.getElementById('check-auto-theme').checked;
      document.getElementById('toggle-dark').disabled = isAuto;
      if (isAuto) {
        localStorage.setItem('calendapp_theme', 'auto');
        applySystemTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applySystemTheme);
      } else {
        window.matchMedia('(prefers-color-scheme: dark)').removeEventListener('change', applySystemTheme);
        const isDark = document.getElementById('toggle-dark').checked;
        localStorage.setItem('calendapp_theme', isDark ? 'dark' : 'light');
      }
    }

    function applySystemTheme() {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark);
      document.getElementById('toggle-dark').checked = prefersDark;
    }

    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('theme-icon').textContent = dark ? '🌙' : '☀️';
    }

    // =====================
    // CONNEXION GOOGLE OAUTH
    // =====================
    function loginWithGoogle() {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (response) => {
          if (response.access_token) {
            googleAccessToken = response.access_token;
            fetchGoogleCalendarEvents();
          }
        }
      });
      client.requestAccessToken();
    }

    // =====================
    // IMPORT GOOGLE CALENDAR (6 prochains mois)
    // =====================
    function fetchGoogleCalendarEvents() {
      const now = new Date().toISOString();
      const sixMonths = new Date(Date.now() + 180 * 24 * 60 * 60 * 1000).toISOString();
      fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&timeMax=${sixMonths}&singleEvents=true&orderBy=startTime`, {
        headers: { Authorization: `Bearer ${googleAccessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.items) {
          const googleEvents = data.items.map(item => ({
            id: 'google_' + item.id,
            title: item.summary || '(Sans titre)',
            description: item.description || '',
            start: item.start.dateTime || item.start.date,
            end: item.end.dateTime || item.end.date || null,
            allDay: !!item.start.date,
            recurrence: 'none',
            tagId: null,
            reminders: [],
            fromGoogle: true
          }));
          events = [...events.filter(e => !e.fromGoogle), ...googleEvents];
          localStorage.setItem('calendapp_events', JSON.stringify(events));
          refreshCalendar();
          fetchUserInfo();
        }
      })
      .catch(err => console.error('Erreur Google Calendar:', err));
    }

    function fetchUserInfo() {
      fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
        headers: { Authorization: `Bearer ${googleAccessToken}` }
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('btn-login').style.display = 'none';
        document.getElementById('user-info').style.display = 'inline';
        document.getElementById('user-info').textContent = `👤 ${data.given_name || data.email}`;
      });
    }

  </script>
</body>
