name: Auto increment version

on:
  push:
    branches: [main]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version in index.html
        run: |
          CURRENT_FULL=$(grep -oP 'v\d+\.\d+' index.html | head -1)
          MAJOR=$(echo $CURRENT_FULL | grep -oP '(?<=v)\d+(?=\.)')
          MINOR=$(echo $CURRENT_FULL | grep -oP '(?<=\.)\d+')
          NEW_MINOR=$(printf "%02d" $((MINOR + 1)))
          sed -i "s/$CURRENT_FULL/v$MAJOR.$NEW_MINOR/" index.html

      - name: Commit updated version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "chore: bump to v$MAJOR.$NEW_MINOR" || echo "No changes"
          git push
