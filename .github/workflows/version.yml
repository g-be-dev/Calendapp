name: Auto increment version

on:
  push:
    branches: [main]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version in index.html
        run: |
          CURRENT=$(grep -oP '(?<=v0\.)\d+' index.html | head -1)
          CURRENT=${CURRENT:-3}
          NEW=$(printf "%02d" $((CURRENT + 1)))
          sed -i "s/v0\.$CURRENT/v0.$NEW/" index.html

      - name: Commit updated version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "chore: bump to v0.$NEW" || echo "No changes"
          git push
